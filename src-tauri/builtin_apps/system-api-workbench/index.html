<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Workbench</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#171819;color:#f3f3ef}
    *{box-sizing:border-box}body{margin:0;background:#171819}main{padding:18px;display:grid;gap:14px}
    header,section{border:1px solid #343638;border-radius:8px;background:#202123;padding:14px}header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
    h1,h2,p{margin:0}h1{font-size:22px}h2{font-size:14px;color:#deded9;margin-bottom:10px}p,.muted{color:#a9aaa6;font-size:13px;line-height:1.45}
    button,input,textarea,select{border:1px solid #3f4245;border-radius:6px;background:#2a2c2f;color:#f5f5f2;padding:9px 10px;font:inherit}button{cursor:pointer}button.primary{background:#f2f2ee;color:#151515;border-color:#f2f2ee}
    input,textarea,select{width:100%}textarea{min-height:110px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}.grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:14px}.toolbar{display:flex;flex-wrap:wrap;gap:8px}
    .card{border:1px solid #343638;background:#242629;border-radius:6px;padding:10px}.list{display:grid;gap:8px;max-height:340px;overflow:auto}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}
    pre{margin:0;white-space:pre-wrap;overflow:auto;max-height:480px;background:#151617;border:1px solid #303236;border-radius:6px;padding:10px;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
    @media(max-width:900px){header,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <header>
      <div><h1>API Workbench</h1><p id="lead">Run HTTP requests through Reflex net.fetch, approve hosts, and save reusable presets.</p></div>
      <div class="toolbar"><button id="allow">Allow host</button><button id="send" class="primary">Send</button></div>
    </header>
    <div class="grid">
      <section>
        <h2>Request</h2>
        <div style="display:grid;gap:8px">
          <input id="name" placeholder="Preset name" />
          <div style="display:grid;grid-template-columns:120px minmax(0,1fr);gap:8px"><select id="method"><option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option></select><input id="url" placeholder="https://api.example.com/status" /></div>
          <textarea id="headers" placeholder='Headers JSON: {"accept":"application/json"}'>{}</textarea>
          <textarea id="body" placeholder="Body text or JSON"></textarea>
          <div class="toolbar"><button id="save">Save preset</button><button id="clear">Clear</button></div>
        </div>
      </section>
      <section><h2>Response</h2><pre id="response">No response yet.</pre></section>
    </div>
    <section><h2>Presets</h2><div id="presets" class="list"></div></section>
  </main>
  <script>
    const RU=(navigator.language||"").toLowerCase().startsWith("ru");
    const t=RU?{lead:"Выполняй HTTP через Reflex net.fetch, разрешай hosts и сохраняй presets.",allow:"Разрешить host",send:"Отправить",save:"Сохранить preset",clear:"Очистить",none:"Presets пока нет."}:{lead:"Run HTTP requests through Reflex net.fetch, approve hosts, and save reusable presets.",allow:"Allow host",send:"Send",save:"Save preset",clear:"Clear",none:"No presets yet."};
    const $=id=>document.getElementById(id);let presets=[];
    async function load(){$("lead").textContent=t.lead;$("allow").textContent=t.allow;$("send").textContent=t.send;$("save").textContent=t.save;$("clear").textContent=t.clear;presets=await get("presets",[]);renderPresets();}
    async function get(key,fallback){try{const r=await reflexStorageGet(key);return Array.isArray(r.value)?r.value:fallback}catch(_){return fallback}}
    function current(){return{name:$("name").value.trim()||"Request",method:$("method").value,url:$("url").value.trim(),headers:$("headers").value,body:$("body").value}}
    function host(){try{return new URL($("url").value.trim()).host}catch(_){return""}}
    async function allowHost(){const h=host();if(!h)return;$("response").textContent=JSON.stringify(await reflexNetworkAllowHost(h),null,2)}
    async function send(){
      try{
        const req=current();let headers={};try{headers=JSON.parse(req.headers||"{}")}catch(e){throw new Error("Invalid headers JSON: "+e.message)}
        let body=req.body;try{if(body.trim().startsWith("{")||body.trim().startsWith("["))body=JSON.parse(body)}catch(_){}
        const result=await reflexNetFetch({url:req.url,method:req.method,headers,body:body||null,timeoutMs:30000});
        await reflexStorageSet("lastResponse",{request:req,result,at:Date.now()});
        $("response").textContent=JSON.stringify(result,null,2);
      }catch(e){$("response").textContent=String(e)}
    }
    async function savePreset(){const req=current();if(!req.url)return;presets=[req,...presets.filter(p=>p.name!==req.name)].slice(0,24);await reflexStorageSet("presets",presets);renderPresets()}
    function renderPresets(){ $("presets").innerHTML=presets.length?presets.map((p,i)=>`<div class="card row"><div><strong>${esc(p.name)}</strong><p>${esc(p.method+" "+p.url)}</p></div><button data-load="${i}">Load</button></div>`).join(""):`<p>${t.none}</p>`;document.querySelectorAll("[data-load]").forEach(b=>b.onclick=()=>loadPreset(+b.dataset.load));}
    function loadPreset(i){const p=presets[i];$("name").value=p.name;$("method").value=p.method;$("url").value=p.url;$("headers").value=p.headers||"{}";$("body").value=p.body||""}
    function clearForm(){$("name").value="";$("method").value="GET";$("url").value="";$("headers").value="{}";$("body").value=""}
    function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
    $("allow").onclick=allowHost;$("send").onclick=send;$("save").onclick=savePreset;$("clear").onclick=clearForm;load();
  </script>
</body>
</html>
