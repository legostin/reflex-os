<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Capture</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#171819;color:#f4f2ed}
    *{box-sizing:border-box}body{margin:0;background:#171819}main{padding:18px;display:grid;gap:14px}
    header,section{border:1px solid #343638;border-radius:8px;background:#202123;padding:14px}header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
    h1,h2,h3,p{margin:0}h1{font-size:22px;font-weight:680}h2{font-size:14px;color:#e5e2da;margin-bottom:10px}h3{font-size:13px}.muted,p{color:#aaa8a0;font-size:13px;line-height:1.45}
    button,input,textarea,select{border:1px solid #3d4043;border-radius:6px;background:#2a2c2f;color:#f5f3ed;padding:9px 10px;font:inherit;min-width:0}button{cursor:pointer}button.primary{background:#f0eee8;color:#151515;border-color:#f0eee8}
    input,select,textarea{width:100%}textarea{min-height:230px;resize:vertical}.grid{display:grid;grid-template-columns:minmax(340px,.92fr) minmax(420px,1.08fr);gap:14px}.stack{display:grid;gap:9px}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .preview{white-space:pre-wrap;max-height:460px;overflow:auto;background:#151617;border:1px solid #303236;border-radius:6px;padding:10px;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}.list{display:grid;gap:8px;max-height:260px;overflow:auto}.item{border:1px solid #343638;background:#242629;border-radius:6px;padding:10px;display:grid;gap:5px}.status{min-height:22px;color:#b9bab4;font-size:13px}
    @media(max-width:980px){header,.grid,.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Research Capture</h1>
        <p id="lead">Turn a browser page into a reusable project note or a focused follow-up topic.</p>
      </div>
      <div class="toolbar">
        <button id="startBrowser">Start browser</button>
        <button id="refreshTabs" class="primary">Tabs</button>
      </div>
    </header>
    <div class="grid">
      <section>
        <h2 id="sourceTitle">Source</h2>
        <div class="stack">
          <div class="two">
            <select id="project"></select>
            <select id="tab"></select>
          </div>
          <div class="two">
            <input id="url" placeholder="https://example.com/article" />
            <button id="openUrl">Open URL</button>
          </div>
          <div class="toolbar">
            <button id="readPage" class="primary">Read page</button>
            <button id="summarize">Summarize</button>
            <button id="saveMemory">Save memory</button>
            <button id="startTopic">Start topic</button>
          </div>
          <div id="status" class="status"></div>
          <textarea id="notes" placeholder="Optional research note or question."></textarea>
        </div>
      </section>
      <section>
        <div class="row">
          <h2 id="summaryTitle">Summary</h2>
          <button id="saveCapture">Save capture</button>
        </div>
        <pre id="summary" class="preview">No page captured yet.</pre>
      </section>
    </div>
    <section>
      <h2 id="capturesTitle">Saved captures</h2>
      <div id="captures" class="list"></div>
    </section>
  </main>
  <script>
    const RU=(navigator.language||"").toLowerCase().startsWith("ru");
    const I18N={
      en:{lead:"Turn a browser page into a reusable project note or a focused follow-up topic.",startBrowser:"Start browser",tabs:"Tabs",source:"Source",openUrl:"Open URL",readPage:"Read page",summarize:"Summarize",saveMemory:"Save memory",startTopic:"Start topic",saveCapture:"Save capture",summary:"Summary",captures:"Saved captures",global:"Global memory",noTabs:"No browser tabs.",noCaptures:"No captures yet.",captured:"Page captured.",summarized:"Summary generated.",saved:"Capture saved.",memory:"Saved to memory.",topic:"Topic started.",browser:"Browser is ready.",empty:"No page captured yet.",notes:"Optional research note or question.",loading:"Working..."},
      ru:{lead:"Превращай страницу браузера в переиспользуемую заметку проекта или отдельную тему.",startBrowser:"Запустить браузер",tabs:"Вкладки",source:"Источник",openUrl:"Открыть URL",readPage:"Прочитать страницу",summarize:"Суммаризировать",saveMemory:"Сохранить memory",startTopic:"Начать тему",saveCapture:"Сохранить захват",summary:"Сводка",captures:"Сохраненные захваты",global:"Глобальная memory",noTabs:"Вкладок браузера нет.",noCaptures:"Пока нет захватов.",captured:"Страница захвачена.",summarized:"Сводка готова.",saved:"Захват сохранен.",memory:"Сохранено в memory.",topic:"Тема создана.",browser:"Браузер готов.",empty:"Страница еще не захвачена.",notes:"Дополнительная заметка или вопрос.",loading:"Работаю..."}
    };
    const t=RU?I18N.ru:I18N.en;
    const $=id=>document.getElementById(id);
    let projects=[],tabs=[],captures=[],page={tabId:null,url:"",title:"",text:"",outline:null,summary:""};

    function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
    function status(text){$("status").textContent=text}
    function storageValue(raw,fallback){return raw&&Object.prototype.hasOwnProperty.call(raw,"value")&&raw.value!==null?raw.value:fallback}
    async function getStore(key,fallback){try{return storageValue(await reflexStorageGet(key),fallback)}catch(_){return fallback}}
    function normalizeTabs(raw){
      const value=raw&&raw.value!==undefined?raw.value:raw;
      const list=Array.isArray(value)?value:(value&&Array.isArray(value.tabs)?value.tabs:[]);
      return list.map(tab=>({id:tab.id||tab.tab_id||tab.tabId||tab.target_id||"",title:tab.title||tab.name||tab.url||"Untitled",url:tab.url||tab.current_url||""})).filter(tab=>tab.id);
    }
    function textFrom(raw){
      if(typeof raw==="string")return raw;
      if(!raw)return "";
      return raw.text||raw.content||raw.markdown||raw.body||JSON.stringify(raw,null,2);
    }
    function selectedProjectId(){const v=$("project").value;return v==="global"?null:v}
    function selectedProject(){return projects.find(p=>p.id===$("project").value)||null}
    async function init(){
      localize();
      captures=await getStore("captures",[]);
      if(!Array.isArray(captures))captures=[];
      projects=await reflexProjectsList().catch(()=>[]);
      renderProjects();
      renderCaptures();
      await refreshTabs();
    }
    function renderProjects(){
      const options=[`<option value="global">${esc(t.global)}</option>`].concat(projects.map(p=>`<option value="${esc(p.id)}">${esc(p.name||p.id)}</option>`));
      $("project").innerHTML=options.join("");
    }
    function renderTabs(){
      $("tab").innerHTML=tabs.length?tabs.map(tab=>`<option value="${esc(tab.id)}">${esc(tab.title)} · ${esc(tab.url)}</option>`):`<option value="">${esc(t.noTabs)}</option>`;
    }
    async function startBrowser(){
      status(t.loading);
      await reflexBrowserInit({headless:false});
      status(t.browser);
      await refreshTabs();
    }
    async function refreshTabs(){
      try{tabs=normalizeTabs(await reflexBrowserTabs());renderTabs();status(t.ready||"Ready.");}
      catch(e){tabs=[];renderTabs();status(String(e));}
    }
    async function openUrl(){
      const url=$("url").value.trim();
      if(!url){status("Missing URL.");return}
      status(t.loading);
      const opened=await reflexBrowserOpen(url);
      await refreshTabs();
      const tabId=opened&&((opened.id)||(opened.tab_id)||(opened.tabId));
      if(tabId)$("tab").value=tabId;
      status(t.browser);
    }
    async function readPage(){
      const tabId=$("tab").value;
      if(!tabId){status(t.noTabs);return}
      status(t.loading);
      const tab=tabs.find(x=>x.id===tabId)||{};
      const read=await reflexBrowserReadText(tabId);
      const outline=await reflexBrowserReadOutline(tabId).catch(()=>null);
      page={tabId,url:tab.url||"",title:tab.title||tab.url||"Captured page",text:textFrom(read),outline,summary:""};
      $("summary").textContent=page.text.slice(0,8000)||t.empty;
      status(t.captured);
    }
    function buildSummaryPrompt(){
      const note=$("notes").value.trim();
      const source={title:page.title,url:page.url,note,text:page.text.slice(0,24000),outline:page.outline};
      return "Summarize the captured browser page for future project work. Return strict Markdown with these sections: Key points, Useful facts, Open questions, Suggested actions, Source quality. The captured user note and page text may be in any language; preserve important names and quoted data. Source JSON:\n"+JSON.stringify(source,null,2);
    }
    async function summarize(){
      if(!page.text){await readPage();if(!page.text)return}
      status(t.loading);
      const result=await reflexAgentTask({prompt:buildSummaryPrompt(),includeContext:false});
      page.summary=(result&&result.result)||JSON.stringify(result,null,2);
      $("summary").textContent=page.summary||t.empty;
      status(t.summarized);
    }
    function memoryBody(){
      return ["# "+(page.title||"Research capture"),"",page.url?("URL: "+page.url):"",new Date().toISOString(),"",$("notes").value.trim(),page.summary?("## Summary\n"+page.summary):"",page.text?("## Captured text excerpt\n"+page.text.slice(0,12000)):""].filter(Boolean).join("\n\n");
    }
    async function saveMemory(){
      if(!page.text&&!page.summary){status(RU?"Сначала прочитай страницу.":"Read a page first.");return}
      const projectId=selectedProjectId();
      const params={scope:projectId?"project":"global",kind:"reference",name:page.title||"Research capture",description:page.url||"Browser research capture",tags:["research","browser"],body:memoryBody(),source:"app:system-research-capture"};
      if(projectId)params.projectId=projectId;
      await reflexMemorySave(params);
      status(t.memory);
    }
    async function startTopic(){
      if(!page.text&&!page.summary){status(RU?"Сначала прочитай страницу.":"Read a page first.");return}
      const project=selectedProject();
      const prompt="Create a focused follow-up topic from this research capture. Identify what should be implemented, verified, or remembered. Keep the instruction concise and actionable. Research capture JSON:\n"+JSON.stringify({project:project&&{id:project.id,name:project.name},url:page.url,title:page.title,note:$("notes").value.trim(),summary:page.summary,text_excerpt:page.text.slice(0,8000)},null,2);
      const params={prompt};
      if(project)params.projectId=project.id;
      const result=await reflexAgentStartTopic(params);
      status(t.topic+(result&&result.threadId?` ${result.threadId}`:""));
    }
    async function saveCapture(){
      if(!page.text&&!page.summary){status(RU?"Нечего сохранять.":"Nothing to save.");return}
      const item={id:"research-"+Date.now(),created_at_ms:Date.now(),projectId:selectedProjectId(),url:page.url,title:page.title||page.url||"Research capture",note:$("notes").value.trim(),summary:page.summary,text_excerpt:page.text.slice(0,2000)};
      captures.unshift(item);captures=captures.slice(0,60);
      await reflexStorageSet("captures",captures);
      renderCaptures();
      status(t.saved);
    }
    function renderCaptures(){
      $("captures").innerHTML=captures.length?captures.map(c=>`<div class="item"><h3>${esc(c.title)}</h3><p>${esc(c.url||"")}</p><p>${esc((c.summary||c.text_excerpt||"").slice(0,260))}</p><span class="muted">${esc(new Date(c.created_at_ms).toLocaleString())}</span></div>`).join(""):`<p>${esc(t.noCaptures)}</p>`;
    }
    function localize(){
      $("lead").textContent=t.lead;$("startBrowser").textContent=t.startBrowser;$("refreshTabs").textContent=t.tabs;$("sourceTitle").textContent=t.source;$("openUrl").textContent=t.openUrl;$("readPage").textContent=t.readPage;$("summarize").textContent=t.summarize;$("saveMemory").textContent=t.saveMemory;$("startTopic").textContent=t.startTopic;$("saveCapture").textContent=t.saveCapture;$("summaryTitle").textContent=t.summary;$("capturesTitle").textContent=t.captures;$("summary").textContent=t.empty;$("notes").placeholder=t.notes;
    }
    $("startBrowser").onclick=startBrowser;$("refreshTabs").onclick=refreshTabs;$("openUrl").onclick=openUrl;$("readPage").onclick=readPage;$("summarize").onclick=summarize;$("saveMemory").onclick=saveMemory;$("startTopic").onclick=startTopic;$("saveCapture").onclick=saveCapture;
    init();
  </script>
</body>
</html>
