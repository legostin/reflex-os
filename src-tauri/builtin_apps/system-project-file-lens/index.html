<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project File Lens</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#171819;color:#f3f3ef}
    *{box-sizing:border-box}body{margin:0;background:#171819}main{padding:18px;display:grid;gap:14px}
    header,section{border:1px solid #343638;border-radius:8px;background:#202123;padding:14px}header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
    h1,h2,p{margin:0}h1{font-size:22px}h2{font-size:14px;color:#deded9;margin-bottom:10px}p,.muted{color:#a9aaa6;font-size:13px;line-height:1.45}
    button,input,select{border:1px solid #3f4245;border-radius:6px;background:#2a2c2f;color:#f5f5f2;padding:9px 10px;font:inherit}button{cursor:pointer}button.primary{background:#f2f2ee;color:#151515;border-color:#f2f2ee}
    input,select{width:100%}.toolbar{display:flex;flex-wrap:wrap;gap:8px}.grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:14px}.list{display:grid;gap:8px;max-height:430px;overflow:auto}
    .card{border:1px solid #343638;background:#242629;border-radius:6px;padding:10px}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}
    code{overflow-wrap:anywhere}.preview{white-space:pre-wrap;overflow:auto;max-height:460px;background:#151617;border:1px solid #303236;border-radius:6px;padding:10px;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
    @media(max-width:900px){header,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <header>
      <div><h1>Project File Lens</h1><p id="lead">Search project files, preview content, and keep a configurable bookmark shelf.</p></div>
      <div class="toolbar"><button id="refresh">Projects</button><button id="openProject" class="primary">Open project</button></div>
    </header>
    <section>
      <div class="toolbar" style="display:grid;grid-template-columns:minmax(180px,280px) minmax(0,1fr) auto;align-items:center">
        <select id="project"></select>
        <input id="query" placeholder="Search path or content" />
        <button id="search" class="primary">Search</button>
      </div>
    </section>
    <div class="grid">
      <section><h2>Matches</h2><div id="matches" class="list"></div></section>
      <section><h2>Preview</h2><pre id="preview" class="preview">No file selected.</pre></section>
    </div>
    <section><h2>Bookmarks</h2><div id="bookmarks" class="list"></div></section>
  </main>
  <script>
    const RU=(navigator.language||"").toLowerCase().startsWith("ru");
    const t=RU?{lead:"Ищи файлы проекта, смотри содержимое и сохраняй настраиваемые bookmarks.",projects:"Проекты",open:"Открыть проект",search:"Искать",none:"Нет данных."}:{lead:"Search project files, preview content, and keep a configurable bookmark shelf.",projects:"Projects",open:"Open project",search:"Search",none:"No data."};
    const $=id=>document.getElementById(id);let projects=[];let bookmarks=[];
    async function load(){
      $("lead").textContent=t.lead;$("refresh").textContent=t.projects;$("openProject").textContent=t.open;$("search").textContent=t.search;
      bookmarks=(await storageGet("bookmarks",[]));await refreshProjects();renderBookmarks();
    }
    async function storageGet(key,fallback){try{const r=await reflexStorageGet(key);return Array.isArray(r.value)?r.value:fallback}catch(_){return fallback}}
    async function refreshProjects(){
      try{
        const ctx=await reflexSystemContext().catch(()=>({linked_projects:[]}));
        const all=await reflexProjectsList({includeApps:true}).catch(()=>[]);
        const linked=(ctx.linked_projects||[]).map(p=>p.id);
        projects=all.sort((a,b)=>(linked.includes(b.id)?1:0)-(linked.includes(a.id)?1:0));
        $("project").innerHTML=projects.map(p=>`<option value="${esc(p.id)}">${esc(p.name||p.id)}</option>`).join("");
      }catch(e){$("preview").textContent=String(e)}
    }
    async function search(){
      const query=$("query").value.trim();if(!query)return;
      try{
        const result=await reflexProjectFilesSearch({projectId:$("project").value,query,includeContent:true,limit:80});
        $("matches").innerHTML=(result.matches||[]).length?result.matches.map(matchCard).join(""):`<p>${t.none}</p>`;
        document.querySelectorAll("[data-read]").forEach(b=>b.onclick=()=>readFile(b.dataset.read));
        document.querySelectorAll("[data-bookmark]").forEach(b=>b.onclick=()=>bookmark(b.dataset.bookmark));
      }catch(e){$("matches").innerHTML=`<p>${esc(String(e))}</p>`}
    }
    function matchCard(m){const path=m.path||m.rel_path||"";return `<div class="card row"><div><code>${esc(path)}</code><p>${esc(m.reason||m.match_type||"match")}</p></div><div class="toolbar"><button data-read="${esc(path)}">Read</button><button data-bookmark="${esc(path)}">Save</button></div></div>`}
    async function readFile(path){
      try{const file=await reflexProjectFilesRead({projectId:$("project").value,path});$("preview").textContent=file.content||"";await reflexStorageSet("lastRead",{projectId:$("project").value,path,at:Date.now()});}
      catch(e){$("preview").textContent=String(e)}
    }
    async function bookmark(path){
      const projectId=$("project").value;const projectName=$("project").selectedOptions[0]?.textContent||projectId;
      bookmarks=[{projectId,projectName,path,at:Date.now()},...bookmarks.filter(b=>!(b.projectId===projectId&&b.path===path))].slice(0,30);
      await reflexStorageSet("bookmarks",bookmarks);renderBookmarks();
    }
    function renderBookmarks(){
      $("bookmarks").innerHTML=bookmarks.length?bookmarks.map((b,i)=>`<div class="card row"><div><code>${esc(b.path)}</code><p>${esc(b.projectName)}</p></div><div class="toolbar"><button data-open="${i}">Read</button><button data-copy="${i}">Copy</button></div></div>`).join(""):`<p>${t.none}</p>`;
      document.querySelectorAll("[data-open]").forEach(btn=>btn.onclick=()=>{const b=bookmarks[+btn.dataset.open];$("project").value=b.projectId;readFile(b.path)});
      document.querySelectorAll("[data-copy]").forEach(btn=>btn.onclick=()=>reflexClipboardWriteText(bookmarks[+btn.dataset.copy].path));
    }
    function openProject(){const id=$("project").value;if(id)reflexProjectsOpen(id)}
    function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
    $("refresh").onclick=refreshProjects;$("search").onclick=search;$("query").onkeydown=e=>{if(e.key==="Enter")search()};$("openProject").onclick=openProject;load();
  </script>
</body>
</html>
