<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Cockpit</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#171819;color:#f4f2ed}
    *{box-sizing:border-box}body{margin:0;background:#171819}main{padding:18px;display:grid;gap:14px}
    header,section{border:1px solid #343638;border-radius:8px;background:#202123;padding:14px}header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
    h1,h2,h3,p{margin:0}h1{font-size:22px;font-weight:680}h2{font-size:14px;color:#e5e2da;margin-bottom:10px}h3{font-size:13px}.muted,p{color:#aaa8a0;font-size:13px;line-height:1.45}
    button,input,select{border:1px solid #3d4043;border-radius:6px;background:#2a2c2f;color:#f5f3ed;padding:9px 10px;font:inherit;min-width:0}button{cursor:pointer}button.primary{background:#f0eee8;color:#151515;border-color:#f0eee8}
    .grid{display:grid;grid-template-columns:minmax(280px,.9fr) minmax(420px,1.1fr);gap:14px}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.metric{border:1px solid #343638;background:#242629;border-radius:6px;padding:10px;min-height:76px}.metric strong{display:block;font-size:24px}.metric span{color:#9fa19d;font-size:12px}
    .stack{display:grid;gap:9px}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}.list{display:grid;gap:8px;max-height:430px;overflow:auto}.item{border:1px solid #343638;background:#242629;border-radius:6px;padding:10px;display:grid;gap:6px}.path{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;color:#d8d4ca;overflow-wrap:anywhere}.status{min-height:22px;color:#b9bab4;font-size:13px}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:980px){header,.grid,.metrics,.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Project Cockpit</h1>
        <p id="lead">One operational screen for the project you are actually working on.</p>
      </div>
      <div class="toolbar">
        <button id="openProject">Open</button>
        <button id="refresh" class="primary">Refresh</button>
      </div>
    </header>
    <section>
      <div class="two">
        <select id="project"></select>
        <input id="fileQuery" placeholder="Search files: TODO, mcp, settings" />
      </div>
      <div class="toolbar" style="margin-top:8px">
        <button id="saveDefault">Make default</button>
        <button id="searchFiles">Search files</button>
        <button id="listFiles">List root</button>
      </div>
      <div id="status" class="status"></div>
    </section>
    <section>
      <div id="metrics" class="metrics"></div>
    </section>
    <div class="grid">
      <section>
        <div class="row">
          <h2 id="topicsTitle">Recent topics</h2>
          <span id="topicCount" class="muted"></span>
        </div>
        <div id="topics" class="list"></div>
      </section>
      <section>
        <div class="row">
          <h2 id="filesTitle">Files and linked utilities</h2>
          <span id="fileCount" class="muted"></span>
        </div>
        <div id="files" class="list"></div>
      </section>
    </div>
  </main>
  <script>
    const RU=(navigator.language||"").toLowerCase().startsWith("ru");
    const I18N={
      en:{lead:"One operational screen for the project you are actually working on.",open:"Open",refresh:"Refresh",saveDefault:"Make default",searchFiles:"Search files",listFiles:"List root",topics:"Recent topics",files:"Files and linked utilities",noProjects:"No projects are registered.",noTopics:"No topics found.",noFiles:"No files or utilities found.",ready:"Ready.",saved:"Default project saved.",refreshed:"Snapshot refreshed.",projects:"Projects",topicsMetric:"Topics",memory:"Memory notes",schedules:"Schedules",apps:"Linked apps",done:"done",openTopic:"Open topic",openApp:"Open app"},
      ru:{lead:"Один рабочий экран для проекта, которым ты сейчас реально занимаешься.",open:"Открыть",refresh:"Обновить",saveDefault:"Сделать по умолчанию",searchFiles:"Искать файлы",listFiles:"Показать корень",topics:"Последние темы",files:"Файлы и утилиты проекта",noProjects:"Проекты не зарегистрированы.",noTopics:"Темы не найдены.",noFiles:"Файлы или утилиты не найдены.",ready:"Готово.",saved:"Проект по умолчанию сохранен.",refreshed:"Снимок обновлен.",projects:"Проекты",topicsMetric:"Темы",memory:"Memory notes",schedules:"Автоматизации",apps:"Linked apps",done:"завершено",openTopic:"Открыть тему",openApp:"Открыть app"}
    };
    const t=RU?I18N.ru:I18N.en;
    const $=id=>document.getElementById(id);
    let projects=[],topics=[],files=[],apps=[],scheduler=null,memory=null,settings={};

    function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
    function status(text){$("status").textContent=text}
    function storageValue(raw,fallback){return raw&&Object.prototype.hasOwnProperty.call(raw,"value")&&raw.value!==null?raw.value:fallback}
    async function getStore(key,fallback){try{return storageValue(await reflexStorageGet(key),fallback)}catch(_){return fallback}}
    function selectedProject(){return projects.find(p=>p.id===$("project").value)||null}
    async function init(){
      localize();
      settings=await getStore("settings",{});
      projects=await reflexProjectsList().catch(()=>[]);
      renderProjects();
      await refreshAll();
    }
    function renderProjects(){
      if(!projects.length){$("project").innerHTML=`<option value="">${esc(t.noProjects)}</option>`;return}
      $("project").innerHTML=projects.map(p=>`<option value="${esc(p.id)}">${esc(p.name||p.id)}</option>`).join("");
      if(settings.projectId&&projects.some(p=>p.id===settings.projectId))$("project").value=settings.projectId;
    }
    async function refreshAll(){
      const project=selectedProject();
      if(!project){renderEmpty();status(t.noProjects);return}
      status(RU?"Загружаю данные проекта...":"Loading project data...");
      const pid=project.id;
      const topicReq=reflexTopicsList({projectId:pid,limit:12}).catch(e=>({error:String(e)}));
      const memReq=reflexMemoryStats({projectId:pid}).catch(e=>({error:String(e)}));
      const schedReq=reflexSchedulerStats({includeAll:true,recentLimit:100}).catch(e=>({error:String(e)}));
      const appsReq=reflexAppsList().catch(()=>[]);
      const fileReq=reflexProjectFilesList({projectId:pid,path:".",recursive:false}).catch(e=>({error:String(e)}));
      const results=await Promise.all([topicReq,memReq,schedReq,appsReq,fileReq]);
      topics=Array.isArray(results[0])?results[0]:[];
      memory=results[1]||null;
      scheduler=results[2]||null;
      apps=Array.isArray(results[3])?results[3]:[];
      files=(results[4]&&Array.isArray(results[4].entries))?results[4].entries:[];
      await reflexStorageSet("lastSnapshot",{projectId:pid,updated_at_ms:Date.now(),topics:topics.length,memory,scheduler,files:files.length});
      render();
      status(t.refreshed);
    }
    function renderEmpty(){
      $("metrics").innerHTML="";
      $("topics").innerHTML=`<p>${esc(t.noTopics)}</p>`;
      $("files").innerHTML=`<p>${esc(t.noFiles)}</p>`;
    }
    function render(){
      renderMetrics();
      renderTopics();
      renderFilesAndApps();
    }
    function countScheduler(){
      const s=scheduler&&scheduler.schedules?scheduler.schedules:{};
      return s.total||s.count||0;
    }
    function memoryCount(){
      if(!memory||memory.error)return "0";
      if(typeof memory.notes==="number")return memory.notes;
      if(typeof memory.total==="number")return memory.total;
      if(memory.counts&&typeof memory.counts.total==="number")return memory.counts.total;
      return memory.files||memory.indexed||0;
    }
    function linkedApps(){
      const project=selectedProject();
      const ids=new Set(((project&&project.apps)||[]).filter(Boolean));
      return apps.filter(a=>ids.has(a.id||a.app_id));
    }
    function renderMetrics(){
      const done=topics.filter(x=>x.done).length;
      const cards=[
        [projects.length,t.projects],
        [topics.length,t.topicsMetric+" / "+done+" "+t.done],
        [memoryCount(),t.memory],
        [countScheduler(),t.schedules],
        [linkedApps().length,t.apps]
      ];
      $("metrics").innerHTML=cards.map(c=>`<div class="metric"><strong>${esc(c[0])}</strong><span>${esc(c[1])}</span></div>`).join("");
    }
    function renderTopics(){
      $("topicsTitle").textContent=t.topics;$("topicCount").textContent=topics.length?String(topics.length):"";
      $("topics").innerHTML=topics.length?topics.map(topicCard).join(""):`<p>${esc(t.noTopics)}</p>`;
      document.querySelectorAll("[data-topic]").forEach(b=>b.onclick=()=>reflexTopicsOpen({threadId:b.dataset.topic,projectId:b.dataset.project}));
    }
    function topicCard(topic){
      const title=topic.title||topic.prompt||topic.goal||topic.thread_id;
      return `<div class="item"><div class="row"><h3>${esc(title)}</h3><button data-topic="${esc(topic.thread_id)}" data-project="${esc(topic.project_id)}">${esc(t.openTopic)}</button></div><p>${esc(topic.prompt||topic.goal||"")}</p><span class="muted">${esc(new Date(topic.created_at_ms||0).toLocaleString())} · ${topic.event_count||0} events</span></div>`;
    }
    function renderFilesAndApps(){
      const linked=linkedApps();
      const fileItems=files.map(fileCard);
      const appItems=linked.map(appCard);
      $("filesTitle").textContent=t.files;$("fileCount").textContent=String(files.length+linked.length);
      $("files").innerHTML=(fileItems.length||appItems.length)?fileItems.concat(appItems).join(""):`<p>${esc(t.noFiles)}</p>`;
      document.querySelectorAll("[data-app]").forEach(b=>b.onclick=()=>reflexAppsOpen(b.dataset.app));
    }
    function fileCard(f){
      const size=typeof f.size==="number"?`${f.size} bytes`:(f.kind||f.type||"");
      return `<div class="item"><span class="path">${esc(f.path||f.rel_path||f.name)}</span><p>${esc(size)}</p></div>`;
    }
    function appCard(app){
      return `<div class="item"><div class="row"><h3>${esc(app.name||app.id||app.app_id)}</h3><button data-app="${esc(app.id||app.app_id)}">${esc(t.openApp)}</button></div><p>${esc(app.description||"")}</p></div>`;
    }
    async function searchFiles(){
      const project=selectedProject();if(!project)return;
      const query=$("fileQuery").value.trim();
      if(!query){await listFiles();return}
      const result=await reflexProjectFilesSearch({projectId:project.id,query,includeContent:false,limit:80});
      files=Array.isArray(result.matches)?result.matches:[];
      renderFilesAndApps();
      status(RU?"Поиск завершен.":"Search complete.");
    }
    async function listFiles(){
      const project=selectedProject();if(!project)return;
      const result=await reflexProjectFilesList({projectId:project.id,path:".",recursive:false});
      files=Array.isArray(result.entries)?result.entries:[];
      renderFilesAndApps();
      status(t.ready);
    }
    async function saveDefault(){
      settings=Object.assign({},settings,{projectId:$("project").value});
      await reflexStorageSet("settings",settings);
      status(t.saved);
    }
    async function openProject(){const p=selectedProject();if(p)await reflexProjectsOpen(p.id)}
    function localize(){
      $("lead").textContent=t.lead;$("openProject").textContent=t.open;$("refresh").textContent=t.refresh;$("saveDefault").textContent=t.saveDefault;$("searchFiles").textContent=t.searchFiles;$("listFiles").textContent=t.listFiles;$("topicsTitle").textContent=t.topics;$("filesTitle").textContent=t.files;
    }
    $("refresh").onclick=refreshAll;$("project").onchange=refreshAll;$("searchFiles").onclick=searchFiles;$("listFiles").onclick=listFiles;$("saveDefault").onclick=saveDefault;$("openProject").onclick=openProject;
    init();
  </script>
</body>
</html>
