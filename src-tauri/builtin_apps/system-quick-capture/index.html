<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Capture</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#171819;color:#f4f2ed}
    *{box-sizing:border-box}body{margin:0;background:#171819}main{padding:18px;display:grid;gap:14px}
    header,section{border:1px solid #343638;border-radius:8px;background:#202123;padding:14px}header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
    h1,h2,h3,p{margin:0}h1{font-size:22px;font-weight:680}h2{font-size:14px;color:#e4e1da;margin-bottom:10px}h3{font-size:13px;margin-bottom:4px}.muted,p{color:#aaa8a0;font-size:13px;line-height:1.45}
    button,input,textarea,select{border:1px solid #3d4043;border-radius:6px;background:#2a2c2f;color:#f5f3ed;padding:9px 10px;font:inherit;min-width:0}button{cursor:pointer}button.primary{background:#f0eee8;color:#151515;border-color:#f0eee8}button.danger{color:#ffb3aa;border-color:#5c3732}
    textarea{min-height:144px;resize:vertical}input,textarea,select{width:100%}.grid{display:grid;grid-template-columns:minmax(320px,.95fr) minmax(360px,1.05fr);gap:14px}.stack{display:grid;gap:9px}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}
    .capture{border:1px solid #343638;background:#242629;border-radius:6px;padding:10px;display:grid;gap:8px}.capture .meta{display:flex;gap:8px;flex-wrap:wrap;color:#8f918d;font-size:12px}.pill{border:1px solid #3c3f42;border-radius:999px;padding:3px 7px}.list{display:grid;gap:8px;max-height:520px;overflow:auto}.status{min-height:22px;color:#b9bab4;font-size:13px}.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:920px){header,.grid,.split{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Quick Capture</h1>
        <p id="lead">Capture anything, then hand it off to memory, a topic, or a review reminder.</p>
      </div>
      <div class="toolbar">
        <button id="refresh">Refresh</button>
        <button id="notify" class="primary">Notify</button>
      </div>
    </header>
    <div class="grid">
      <section>
        <h2 id="captureTitle">New capture</h2>
        <div class="stack">
          <div class="split">
            <select id="type">
              <option value="task">Task</option>
              <option value="idea">Idea</option>
              <option value="link">Link</option>
              <option value="bug">Bug</option>
              <option value="decision">Decision</option>
              <option value="note">Note</option>
            </select>
            <select id="destination"></select>
          </div>
          <input id="title" placeholder="Short title" />
          <input id="tags" placeholder="tags: project, follow-up, api" />
          <textarea id="body" placeholder="Paste a thought, task, link, bug report, meeting note, or decision."></textarea>
          <div class="toolbar">
            <button id="save" class="primary">Save to inbox</button>
            <button id="memory">Save memory</button>
            <button id="topic">Start topic</button>
          </div>
          <div class="stack" style="margin-top:6px">
            <h2 id="reminderTitle">Review reminder</h2>
            <div class="split">
              <input id="cron" value="0 0 9 * * *" />
              <button id="schedule">Enable reminder</button>
            </div>
          </div>
          <div id="status" class="status"></div>
        </div>
      </section>
      <section>
        <div class="row">
          <h2 id="inboxTitle">Inbox</h2>
          <button id="clear" class="danger">Clear processed</button>
        </div>
        <div id="list" class="list"></div>
      </section>
    </div>
  </main>
  <script>
    const RU=(navigator.language||"").toLowerCase().startsWith("ru");
    const I18N={
      en:{lead:"Capture anything, then hand it off to memory, a topic, or a review reminder.",refresh:"Refresh",notify:"Notify",captureTitle:"New capture",inboxTitle:"Inbox",reminderTitle:"Review reminder",save:"Save to inbox",memory:"Save memory",topic:"Start topic",schedule:"Enable reminder",clear:"Clear processed",empty:"Nothing captured yet.",saved:"Saved to inbox.",memorySaved:"Saved to memory.",topicStarted:"Topic started.",scheduled:"Reminder enabled.",notified:"Notification sent.",processed:"Processed",global:"Global memory",title:"Short title",body:"Paste a thought, task, link, bug report, meeting note, or decision.",tags:"tags: project, follow-up, api"},
      ru:{lead:"Сохраняй любые мысли и быстро передавай их в memory, тему или напоминание.",refresh:"Обновить",notify:"Уведомить",captureTitle:"Новый захват",inboxTitle:"Inbox",reminderTitle:"Напоминание к разбору",save:"Сохранить в inbox",memory:"Сохранить memory",topic:"Начать тему",schedule:"Включить напоминание",clear:"Очистить обработанные",empty:"Пока ничего не сохранено.",saved:"Сохранено в inbox.",memorySaved:"Сохранено в memory.",topicStarted:"Тема создана.",scheduled:"Напоминание включено.",notified:"Уведомление отправлено.",processed:"Обработано",global:"Глобальная memory",title:"Короткий заголовок",body:"Вставь мысль, задачу, ссылку, баг, заметку встречи или решение.",tags:"теги: project, follow-up, api"}
    };
    const t=RU?I18N.ru:I18N.en;
    const $=id=>document.getElementById(id);
    let captures=[];
    let projects=[];

    function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
    function status(text){$("status").textContent=text}
    function storageValue(raw,fallback){return raw&&Object.prototype.hasOwnProperty.call(raw,"value")&&raw.value!==null?raw.value:fallback}
    async function getStore(key,fallback){try{return storageValue(await reflexStorageGet(key),fallback)}catch(_){return fallback}}
    async function setStore(key,value){return reflexStorageSet(key,value)}
    function destinationProject(){const v=$("destination").value;return v==="global"?null:v}
    function tags(){return $("tags").value.split(",").map(s=>s.trim()).filter(Boolean)}
    function now(){return Date.now()}
    function currentItem(){
      const title=$("title").value.trim()||$("type").selectedOptions[0].textContent;
      return {id:"cap-"+now(),created_at_ms:now(),type:$("type").value,title,body:$("body").value.trim(),tags:tags(),projectId:destinationProject()};
    }
    function bodyForMemory(item){
      return ["# "+item.title,"","Type: "+item.type,"Project: "+(item.projectId||"global"),"Tags: "+item.tags.join(", "),"Captured: "+new Date(item.created_at_ms).toISOString(),"",item.body].join("\n");
    }
    function promptForTopic(item){
      return "Analyze the following captured user data and turn it into a concise work plan. Keep quoted user data intact. Return clear next actions, risks, and any questions. Captured data JSON:\n"+JSON.stringify(item,null,2);
    }
    function kindFor(item){return item.type==="bug"?"feedback":(item.type==="link"?"reference":(item.type==="decision"?"project":"fact"))}
    async function load(){
      captures=await getStore("captures",[]);
      if(!Array.isArray(captures))captures=[];
      projects=await reflexProjectsList().catch(()=>[]);
      renderDestinations();
      render();
    }
    function renderDestinations(){
      const selected=$("destination").value;
      const options=[`<option value="global">${esc(t.global)}</option>`].concat((projects||[]).map(p=>`<option value="${esc(p.id)}">${esc(p.name||p.id)}</option>`));
      $("destination").innerHTML=options.join("");
      if(selected)$("destination").value=selected;
    }
    function render(){
      $("list").innerHTML=captures.length?captures.map(card).join(""):`<p>${esc(t.empty)}</p>`;
      document.querySelectorAll("[data-memory]").forEach(b=>b.onclick=()=>saveExistingMemory(b.dataset.memory));
      document.querySelectorAll("[data-topic]").forEach(b=>b.onclick=()=>startExistingTopic(b.dataset.topic));
      document.querySelectorAll("[data-done]").forEach(b=>b.onclick=()=>markDone(b.dataset.done));
    }
    function card(item){
      const project=(projects||[]).find(p=>p.id===item.projectId);
      const meta=[item.type,project?(project.name||project.id):t.global,new Date(item.created_at_ms).toLocaleString()].filter(Boolean);
      return `<div class="capture"><div><h3>${esc(item.title)}</h3><p>${esc(item.body||"")}</p></div><div class="meta">${meta.map(m=>`<span class="pill">${esc(m)}</span>`).join("")}</div><div class="toolbar"><button data-memory="${esc(item.id)}">${esc(t.memory)}</button><button data-topic="${esc(item.id)}">${esc(t.topic)}</button><button data-done="${esc(item.id)}">${esc(t.processed)}</button></div></div>`;
    }
    async function saveInbox(){
      const item=currentItem();
      if(!item.body){status(RU?"Нечего сохранять.":"Nothing to save.");return}
      captures.unshift(item);
      captures=captures.slice(0,80);
      await setStore("captures",captures);
      $("title").value="";$("body").value="";$("tags").value="";
      status(t.saved);render();
    }
    async function saveMemoryFor(item){
      const params={scope:item.projectId?"project":"global",kind:kindFor(item),name:item.title,description:[item.type].concat(item.tags||[]).join(", "),tags:item.tags||[],body:bodyForMemory(item),source:"app:system-quick-capture"};
      if(item.projectId)params.projectId=item.projectId;
      await reflexMemorySave(params);
      status(t.memorySaved);
    }
    async function saveNewMemory(){const item=currentItem();if(!item.body){status(RU?"Нечего сохранять.":"Nothing to save.");return}await saveMemoryFor(item)}
    async function saveExistingMemory(id){const item=captures.find(c=>c.id===id);if(item)await saveMemoryFor(item)}
    async function startTopicFor(item){
      const params={prompt:promptForTopic(item)};
      if(item.projectId)params.projectId=item.projectId;
      const result=await reflexAgentStartTopic(params);
      status(t.topicStarted+(result&&result.threadId?` ${result.threadId}`:""));
    }
    async function startNewTopic(){const item=currentItem();if(!item.body){status(RU?"Нечего отправлять.":"Nothing to send.");return}await startTopicFor(item)}
    async function startExistingTopic(id){const item=captures.find(c=>c.id===id);if(item)await startTopicFor(item)}
    async function markDone(id){captures=captures.filter(c=>c.id!==id);await setStore("captures",captures);render()}
    async function clearProcessed(){captures=[];await setStore("captures",captures);render()}
    async function scheduleReminder(){
      const cron=$("cron").value.trim()||"0 0 9 * * *";
      const result=await reflexSchedulerUpsert({id:"quick-capture-review",name:"Quick Capture review",cron,enabled:true,catch_up:"once",steps:[{method:"notify.show",params:{title:"Quick Capture Review",body:"Open Quick Capture and process the captured inbox."}}]});
      await setStore("reviewSchedule",{cron,updated_at_ms:now(),result});
      status(t.scheduled);
    }
    async function notify(){await reflexNotifyShow("Quick Capture",captures.length?`${captures.length} captured item(s) waiting.`:"Inbox is empty.");status(t.notified)}
    function localize(){
      $("lead").textContent=t.lead;$("refresh").textContent=t.refresh;$("notify").textContent=t.notify;$("captureTitle").textContent=t.captureTitle;$("inboxTitle").textContent=t.inboxTitle;$("reminderTitle").textContent=t.reminderTitle;$("save").textContent=t.save;$("memory").textContent=t.memory;$("topic").textContent=t.topic;$("schedule").textContent=t.schedule;$("clear").textContent=t.clear;$("title").placeholder=t.title;$("body").placeholder=t.body;$("tags").placeholder=t.tags;
    }
    $("save").onclick=saveInbox;$("memory").onclick=saveNewMemory;$("topic").onclick=startNewTopic;$("refresh").onclick=load;$("schedule").onclick=scheduleReminder;$("notify").onclick=notify;$("clear").onclick=clearProcessed;
    localize();load();
  </script>
</body>
</html>
