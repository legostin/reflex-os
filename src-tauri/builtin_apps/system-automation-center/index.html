<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Automation Center</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#171819; color:#f3f3ef; }
    * { box-sizing:border-box; } body { margin:0; background:#171819; }
    main { padding:18px; display:grid; gap:14px; }
    header, section { border:1px solid #343638; border-radius:8px; background:#202123; padding:14px; }
    header { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:12px; align-items:center; }
    h1,h2,p { margin:0; } h1 { font-size:22px; } h2 { font-size:14px; color:#deded9; margin-bottom:10px; }
    p,.muted { color:#a9aaa6; font-size:13px; line-height:1.45; }
    button,input,textarea { border:1px solid #3f4245; border-radius:6px; background:#2a2c2f; color:#f5f5f2; padding:9px 10px; font:inherit; }
    button { cursor:pointer; } button.primary { background:#f2f2ee; color:#151515; border-color:#f2f2ee; }
    input,textarea { width:100%; } textarea { min-height:74px; resize:vertical; }
    .grid { display:grid; grid-template-columns:.9fr 1.1fr; gap:14px; }
    .stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .stat,.card { border:1px solid #343638; background:#242629; border-radius:6px; padding:10px; }
    .stat strong { display:block; font-size:20px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px; }
    .list { display:grid; gap:8px; max-height:420px; overflow:auto; }
    .row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px; align-items:center; }
    code { color:#f3f3ef; overflow-wrap:anywhere; }
    .pill { display:inline-block; padding:2px 7px; border-radius:99px; background:#323538; font-size:12px; color:#c9cac5; margin-right:5px; }
    pre { margin:0; white-space:pre-wrap; overflow:auto; max-height:220px; background:#151617; border:1px solid #303236; border-radius:6px; padding:10px; font:12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    @media (max-width:900px){ header,.grid,.stats{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main>
    <header>
      <div><h1>Automation Center</h1><p id="lead">Review schedules, inspect recent runs, and create configurable reminder workflows.</p></div>
      <div class="toolbar"><button id="refresh" class="primary">Refresh</button><button id="openSettings">Settings</button></div>
    </header>
    <section><div id="stats" class="stats"></div></section>
    <div class="grid">
      <section>
        <h2>Create reminder schedule</h2>
        <div style="display:grid;gap:8px">
          <input id="reminderId" placeholder="id: standup-reminder" />
          <input id="reminderCron" placeholder="cron: 0 0 10 * * 1-5" value="0 0 10 * * 1-5" />
          <input id="reminderTitle" placeholder="notification title" />
          <textarea id="reminderBody" placeholder="notification body"></textarea>
          <button id="saveReminder" class="primary">Save schedule</button>
          <pre id="detail">No run selected.</pre>
        </div>
      </section>
      <section>
        <h2>Schedules</h2>
        <div id="schedules" class="list"></div>
      </section>
    </div>
    <section>
      <h2>Recent runs</h2>
      <div id="runs" class="list"></div>
    </section>
  </main>
  <script>
    const RU = (navigator.language || "").toLowerCase().startsWith("ru");
    const txt = RU ? {
      lead:"Проверяй расписания, последние запуски и создавай настраиваемые reminder workflow.",
      refresh:"Обновить", settings:"Настройки", save:"Сохранить расписание", none:"Нет данных."
    } : {
      lead:"Review schedules, inspect recent runs, and create configurable reminder workflows.",
      refresh:"Refresh", settings:"Settings", save:"Save schedule", none:"No data."
    };
    const $ = id => document.getElementById(id);
    let schedules = [], runs = [], stats = {};
    async function refresh(){
      $("refresh").disabled = true;
      try {
        stats = await reflexSchedulerStats({includeAll:true, recentLimit:100});
        schedules = await reflexSchedulerList({includeAll:true});
        runs = await reflexSchedulerRuns({limit:50});
        await reflexStorageSet("automationSnapshot", {at:Date.now(), stats, schedules:schedules.length, runs:runs.length});
        render();
      } catch (err) { $("detail").textContent = String(err); }
      finally { $("refresh").disabled = false; }
    }
    function render(){
      $("lead").textContent = txt.lead; $("refresh").textContent = txt.refresh; $("openSettings").textContent = txt.settings; $("saveReminder").textContent = txt.save;
      const s = stats || {};
      $("stats").innerHTML = [
        ["Schedules", s.schedules?.total ?? schedules.length],
        ["Enabled", s.schedules?.enabled ?? schedules.filter(x=>x.enabled).length],
        ["Recent runs", s.recent_runs?.sample ?? runs.length],
        ["Failures", s.recent_runs?.error ?? runs.filter(x=>x.status==="error").length]
      ].map(([k,v])=>`<div class="stat"><span class="muted">${k}</span><strong>${v ?? 0}</strong></div>`).join("");
      $("schedules").innerHTML = schedules.length ? schedules.map(scheduleCard).join("") : `<p>${txt.none}</p>`;
      $("runs").innerHTML = runs.length ? runs.map(runCard).join("") : `<p>${txt.none}</p>`;
      document.querySelectorAll("[data-run]").forEach(b=>b.onclick=()=>runNow(b.dataset.run));
      document.querySelectorAll("[data-detail]").forEach(b=>b.onclick=()=>loadDetail(b.dataset.detail));
    }
    function scheduleCard(s){
      const full = s.schedule_id || `${s.app_id}::${s.id}`;
      return `<div class="card row"><div><code>${esc(full)}</code><div><span class="pill">${s.enabled ? "enabled" : "paused"}</span><span class="pill">${esc(s.cron || "")}</span></div><p>${esc(s.name || "")}</p></div><button data-run="${esc(full)}">Run</button></div>`;
    }
    function runCard(r){
      return `<div class="card row"><div><code>${esc(r.run_id || "")}</code><div><span class="pill">${esc(r.status || "")}</span><span class="pill">${esc(r.app_id || "")}</span></div><p>${esc(r.error_preview || r.schedule_id || r.action_id || "")}</p></div><button data-detail="${esc(r.run_id || "")}">Detail</button></div>`;
    }
    async function saveReminder(){
      const id = ($("reminderId").value || "reminder").trim().replace(/[^a-zA-Z0-9_.-]+/g,"-");
      const cron = $("reminderCron").value.trim();
      const title = $("reminderTitle").value.trim() || "Reflex reminder";
      const body = $("reminderBody").value.trim() || "Open Reflex to continue your workflow.";
      try {
        const result = await reflexSchedulerUpsert({id, name:title, cron, enabled:true, catch_up:"once", steps:[{method:"notify.show", params:{title, body}}]});
        $("detail").textContent = JSON.stringify(result,null,2);
        await refresh();
      } catch (err) { $("detail").textContent = String(err); }
    }
    async function runNow(id){ try { $("detail").textContent = JSON.stringify(await reflexSchedulerRunNow(id),null,2); await refresh(); } catch(e){ $("detail").textContent=String(e); } }
    async function loadDetail(id){ try { $("detail").textContent = JSON.stringify(await reflexSchedulerRunDetail(id),null,2); } catch(e){ $("detail").textContent=String(e); } }
    function esc(s){ return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
    $("refresh").onclick=refresh; $("openSettings").onclick=()=>reflexSystemOpenPanel("settings"); $("saveReminder").onclick=saveReminder; refresh();
  </script>
</body>
</html>
