<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bridge Console</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #171819; color: #f2f2f0; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #171819; }
    main { padding: 18px; display: grid; gap: 14px; }
    header, section { border: 1px solid #343638; border-radius: 8px; background: #202123; }
    header { padding: 16px; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; }
    h1, h2, p { margin: 0; }
    h1 { font-size: 22px; font-weight: 680; }
    h2 { font-size: 14px; margin-bottom: 10px; color: #d7d7d2; }
    p { color: #a9aaa6; font-size: 13px; line-height: 1.45; }
    button, input, textarea, select { border: 1px solid #3e4144; background: #2a2c2f; color: #f5f5f2; border-radius: 6px; padding: 9px 10px; font: inherit; }
    button { cursor: pointer; white-space: nowrap; }
    button.primary { background: #f2f2ee; color: #151515; border-color: #f2f2ee; }
    button:disabled { opacity: .55; cursor: default; }
    input, textarea, select { width: 100%; }
    textarea { min-height: 120px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 14px; }
    section { padding: 14px; min-width: 0; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .stat { padding: 10px; border: 1px solid #343638; border-radius: 6px; background: #242629; }
    .stat strong { display: block; font-size: 20px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; }
    .list { display: grid; gap: 6px; max-height: 430px; overflow: auto; }
    .item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 9px; border: 1px solid #333538; border-radius: 6px; background: #232528; }
    .item code { overflow-wrap: anywhere; color: #f2f2f0; }
    .muted { color: #8e918d; font-size: 12px; }
    .result { white-space: pre-wrap; overflow: auto; max-height: 320px; background: #151617; border: 1px solid #303236; border-radius: 6px; padding: 10px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    @media (max-width: 900px) { header, .grid, .stats { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 id="title">Bridge Console</h1>
        <p id="subtitle">Inspect the runtime bridge, pin helper APIs, and execute controlled bridge calls.</p>
      </div>
      <div class="toolbar">
        <button id="refresh" class="primary">Refresh</button>
        <button id="openSettings">Settings</button>
      </div>
    </header>
    <section>
      <div class="stats" id="stats"></div>
    </section>
    <div class="grid">
      <section>
        <h2>Catalog</h2>
        <input id="search" placeholder="Search methods, helpers, permissions..." />
        <div class="list" id="catalog"></div>
      </section>
      <section>
        <h2>Invoke</h2>
        <div style="display:grid;gap:8px">
          <input id="method" placeholder="method, e.g. system.context" />
          <textarea id="params">{}</textarea>
          <div class="toolbar">
            <button id="run" class="primary">Run</button>
            <button id="savePin">Pin method</button>
          </div>
          <pre id="result" class="result">No result yet.</pre>
        </div>
      </section>
    </div>
    <section>
      <h2>Pinned helpers</h2>
      <div class="list" id="pins"></div>
    </section>
  </main>
  <script>
    const RU = (navigator.language || "").toLowerCase().startsWith("ru");
    const text = RU ? {
      subtitle: "Изучай runtime bridge, закрепляй helper API и выполняй контролируемые bridge-вызовы.",
      refresh: "Обновить", settings: "Настройки", noPins: "Закрепленных методов пока нет."
    } : {
      subtitle: "Inspect the runtime bridge, pin helper APIs, and execute controlled bridge calls.",
      refresh: "Refresh", settings: "Settings", noPins: "No pinned methods yet."
    };
    const state = { catalog: null, context: null, apps: [], projects: [], pins: [] };
    const $ = (id) => document.getElementById(id);
    const pretty = (v) => JSON.stringify(v, null, 2);
    async function storageGet(key, fallback) {
      try { const r = await reflexStorageGet(key); return r.value ?? fallback; } catch (_) { return fallback; }
    }
    async function storageSet(key, value) { try { await reflexStorageSet(key, value); } catch (_) {} }
    async function refresh() {
      $("refresh").disabled = true;
      try {
        state.catalog = await reflexBridgeCatalog();
        state.context = await reflexSystemContext();
        state.apps = await reflexAppsList().catch(() => []);
        state.projects = await reflexProjectsList().catch(() => []);
        state.pins = await storageGet("pins", ["system.context", "apps.list", "scheduler.stats", "memory.stats"]);
        await storageSet("lastSnapshot", { at: Date.now(), methods: flattenCatalog(state.catalog.methods).length, helpers: flattenCatalog(state.catalog.helpers).length });
        render();
      } catch (err) {
        $("result").textContent = String(err);
      } finally {
        $("refresh").disabled = false;
      }
    }
    function flattenCatalog(groups) {
      const out = [];
      for (const group of groups || []) for (const item of group.items || group.methods || []) out.push({ group: group.title || "Group", name: item });
      return out;
    }
    function render() {
      $("subtitle").textContent = text.subtitle;
      $("refresh").textContent = text.refresh;
      $("openSettings").textContent = text.settings;
      const methods = flattenCatalog(state.catalog?.methods);
      const helpers = flattenCatalog(state.catalog?.helpers);
      $("stats").innerHTML = [
        ["Methods", methods.length],
        ["Helpers", helpers.length],
        ["Apps", state.apps.length || 0],
        ["Projects", state.projects.length || 0]
      ].map(([k, v]) => `<div class="stat"><span class="muted">${k}</span><strong>${v}</strong></div>`).join("");
      renderCatalog();
      renderPins();
    }
    function renderCatalog() {
      const query = $("search").value.trim().toLowerCase();
      const all = [...flattenCatalog(state.catalog?.methods), ...flattenCatalog(state.catalog?.helpers)];
      const items = all.filter(x => !query || x.name.toLowerCase().includes(query) || x.group.toLowerCase().includes(query)).slice(0, 160);
      $("catalog").innerHTML = items.map(x => `<div class="item"><div><code>${escapeHtml(x.name)}</code><div class="muted">${escapeHtml(x.group)}</div></div><button data-method="${escapeAttr(x.name)}">Use</button></div>`).join("");
      $("catalog").querySelectorAll("button").forEach(btn => btn.onclick = () => { $("method").value = btn.dataset.method; });
    }
    function renderPins() {
      $("pins").innerHTML = state.pins.length ? state.pins.map(name => `<div class="item"><code>${escapeHtml(name)}</code><button data-pin="${escapeAttr(name)}">Use</button></div>`).join("") : `<p>${text.noPins}</p>`;
      $("pins").querySelectorAll("button").forEach(btn => btn.onclick = () => { $("method").value = btn.dataset.pin; });
    }
    async function runMethod() {
      try {
        const method = $("method").value.trim();
        const params = JSON.parse($("params").value || "{}");
        const result = await reflexInvoke(method, params);
        $("result").textContent = pretty(result);
        await reflexLog("info", "Bridge Console invoked " + method).catch(() => {});
      } catch (err) {
        $("result").textContent = String(err);
      }
    }
    async function savePin() {
      const method = $("method").value.trim();
      if (!method) return;
      state.pins = Array.from(new Set([method, ...state.pins])).slice(0, 12);
      await storageSet("pins", state.pins);
      renderPins();
    }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c])); }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g, "&#96;"); }
    $("refresh").onclick = refresh;
    $("openSettings").onclick = () => reflexSystemOpenPanel("settings");
    $("run").onclick = runMethod;
    $("savePin").onclick = savePin;
    $("search").oninput = renderCatalog;
    refresh();
  </script>
</body>
</html>
